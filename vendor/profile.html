<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — OrganicTrade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a1a0d; --bg2: #0f2212; --bg3: #162b1a;
      --gold: #c9a84c; --gold2: #e8c96a;
      --text: #f0ebe0; --text2: #b8b0a0;
      --sidebar-w: 260px; --radius: 14px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    .sidebar { width: var(--sidebar-w); min-height: 100vh; background: linear-gradient(180deg,#061009 0%,#0a1a0d 40%,#061009 100%); border-right: 1px solid rgba(201,168,76,0.15); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid rgba(201,168,76,0.12); }
    .sidebar-logo .logo-mark { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--gold); }
    .sidebar-logo .logo-sub { font-size: 0.7rem; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
    .sidebar-badge { display: inline-block; background: rgba(201,168,76,0.15); color: var(--gold); font-size: 0.65rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; border: 1px solid rgba(201,168,76,0.25); margin-top: 6px; letter-spacing: 1px; text-transform: uppercase; }
    .sidebar-nav { flex: 1; padding: 16px 12px; }
    .nav-label { font-size: 0.65rem; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; padding: 8px 12px 4px; margin-top: 8px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; cursor: pointer; text-decoration: none; color: var(--text2); font-size: 0.875rem; font-weight: 500; transition: all 0.2s; margin-bottom: 2px; }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-item.active { background: linear-gradient(135deg,rgba(201,168,76,0.18),rgba(201,168,76,0.06)); color: var(--gold); border: 1px solid rgba(201,168,76,0.2); }
    .nav-item .icon { font-size: 1.1rem; width: 22px; text-align: center; flex-shrink: 0; }
    .sidebar-profile { padding: 16px; border-top: 1px solid rgba(201,168,76,0.12); }
    .profile-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.12); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .profile-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,var(--gold),#a07830); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1rem; color: var(--bg); flex-shrink: 0; }
    .profile-info .name { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .profile-info .role { font-size: 0.7rem; color: var(--gold); }
    .btn-logout { width: 100%; padding: 9px; background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); border-radius: 8px; color: var(--text2); font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-logout:hover { background: rgba(220,60,60,0.15); border-color: rgba(220,60,60,0.3); color: #f87171; }

    .main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { background: rgba(10,26,13,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(201,168,76,0.1); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 600; }
    .page-content { padding: 32px; flex: 1; max-width: 700px; }

    .profile-hero {
      background: linear-gradient(135deg, rgba(45,106,79,0.3), rgba(201,168,76,0.12));
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius);
      padding: 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 28px;
    }

    .hero-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), #a07830);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--bg);
      border: 3px solid rgba(201,168,76,0.4);
      flex-shrink: 0;
    }

    .hero-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .hero-role { color: var(--gold); font-size: 0.85rem; margin-bottom: 8px; }
    .hero-email { color: var(--text2); font-size: 0.85rem; }

    .form-panel {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .panel-header { padding: 18px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 10px; }
    .panel-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; }
    .panel-body { padding: 24px; }

    .form-group { margin-bottom: 18px; }
    .form-group:last-child { margin-bottom: 0; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text2); margin-bottom: 7px; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 11px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.875rem; outline: none; transition: all 0.25s;
    }
    input:focus { border-color: var(--gold); background: rgba(201,168,76,0.05); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .btn-save {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 24px;
      background: linear-gradient(135deg, var(--gold), #a07830);
      border: none; border-radius: 10px;
      color: #0a1a0d; font-size: 0.875rem; font-weight: 700;
      cursor: pointer; transition: all 0.3s;
    }
    .btn-save:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.3); }

    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { display: flex; align-items: center; gap: 10px; padding: 12px 18px; border-radius: 10px; background: var(--bg3); border: 1px solid rgba(201,168,76,0.25); box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: slideIn 0.3s ease; min-width: 260px; max-width: 360px; }
    .toast.hide { animation: slideOut 0.3s ease forwards; }
    .toast-success { border-color: rgba(52,211,153,0.3); }
    .toast-error   { border-color: rgba(248,113,113,0.3); }
    .toast-icon { font-size: 1.1rem; flex-shrink: 0; }
    .toast-msg  { font-size: 0.85rem; color: var(--text); }
    @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
    @keyframes slideOut { from { opacity:1; transform: translateX(0); } to { opacity:0; transform: translateX(20px); } }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">🌿 OrganicTrade</div>
    <div class="logo-sub">Import &amp; Export</div>
    <span class="sidebar-badge">Product Manager</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Main Menu</div>
    <a href="index.html" class="nav-item"><span class="icon">📊</span> Dashboard</a>
    <a href="my-products.html" class="nav-item"><span class="icon">🌿</span> My Products</a>
    <a href="add-product.html" class="nav-item"><span class="icon">➕</span> Add Product</a>
    <a href="orders.html" class="nav-item"><span class="icon">📦</span> My Orders</a>
    <div class="nav-label" style="margin-top:16px;">Account</div>
    <a href="profile.html" class="nav-item active"><span class="icon">👤</span> Profile</a>
  </nav>
  <div class="sidebar-profile">
    <div class="profile-card">
      <div class="profile-avatar" id="sidebarAvatar">P</div>
      <div class="profile-info">
        <div class="name" id="sidebarName">Loading…</div>
        <div class="role">Product Manager</div>
      </div>
    </div>
    <button class="btn-logout" id="logoutBtn"><span>🚪</span> Sign Out</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-title">👤 My Profile</div>
  </div>
  <div class="page-content">

    <!-- Profile Hero -->
    <div class="profile-hero">
      <div class="hero-avatar" id="heroAvatar">P</div>
      <div>
        <div class="hero-name" id="heroName">Loading…</div>
        <div class="hero-role">🌿 Product Manager · OrganicTrade</div>
        <div class="hero-email" id="heroEmail">—</div>
      </div>
    </div>

    <!-- Edit Profile -->
    <div class="form-panel">
      <div class="panel-header">
        <span style="font-size:1.2rem">✏️</span>
        <div class="panel-title">Edit Profile</div>
      </div>
      <div class="panel-body">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="editName" placeholder="Your full name" />
          </div>
          <div class="form-group">
            <label>Company Name</label>
            <input type="text" id="editCompany" placeholder="Your company or brand" />
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="editEmail" placeholder="you@example.com" />
        </div>
        <button class="btn-save" id="saveProfile">💾 Save Profile</button>
      </div>
    </div>

    <!-- Change Password -->
    <div class="form-panel">
      <div class="panel-header">
        <span style="font-size:1.2rem">🔐</span>
        <div class="panel-title">Change Password</div>
      </div>
      <div class="panel-body">
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" id="currentPw" placeholder="Enter current password" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPw" placeholder="New password" />
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPw" placeholder="Confirm new password" />
          </div>
        </div>
        <button class="btn-save" id="savePassword">🔒 Update Password</button>
      </div>
    </div>

  </div>
</main>

<div id="toast-container"></div>
<script src="../js/store.js"></script>
<script>
  function showToast(msg, type='info') {
    const c = document.getElementById('toast-container');
    const icons = {success:'✅', error:'❌', warning:'⚠️', info:'🌿'};
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.innerHTML = `<span class="toast-icon">${icons[type]||'🌿'}</span><span class="toast-msg">${msg}</span>`;
    c.appendChild(t);
    setTimeout(() => { t.classList.add('hide'); setTimeout(()=>t.remove(),300); }, 3000);
  }

  const user = Store.requireAuth(['vendor'], '../auth.html');
  if (!user) throw new Error('Not authorized');

  // Fill sidebar & hero
  document.getElementById('sidebarName').textContent = user.name;
  document.getElementById('sidebarAvatar').textContent = user.avatar || user.name.charAt(0);
  document.getElementById('heroAvatar').textContent = user.avatar || user.name.charAt(0);
  document.getElementById('heroName').textContent = user.name;
  document.getElementById('heroEmail').textContent = user.email;

  // Fill form
  document.getElementById('editName').value    = user.name || '';
  document.getElementById('editEmail').value   = user.email || '';
  document.getElementById('editCompany').value = user.company || '';

  document.getElementById('logoutBtn').addEventListener('click', () => {
    Store.logout(); window.location.href = '../auth.html';
  });

  document.getElementById('saveProfile').addEventListener('click', () => {
    const name    = document.getElementById('editName').value.trim();
    const email   = document.getElementById('editEmail').value.trim();
    const company = document.getElementById('editCompany').value.trim();
    if (!name || !email) { showToast('Name and email are required.', 'warning'); return; }
    const updated = Store.updateUser(user.id, { name, email, company, avatar: name.charAt(0).toUpperCase() });
    if (updated) {
      Store.setCurrentUser({ ...user, name, email, company, avatar: name.charAt(0).toUpperCase() });
      document.getElementById('heroName').textContent  = name;
      document.getElementById('heroEmail').textContent = email;
      document.getElementById('sidebarName').textContent = name;
      document.getElementById('heroAvatar').textContent = name.charAt(0).toUpperCase();
      document.getElementById('sidebarAvatar').textContent = name.charAt(0).toUpperCase();
      showToast('Profile updated! ✅', 'success');
    } else {
      showToast('Failed to update profile.', 'error');
    }
  });

  document.getElementById('savePassword').addEventListener('click', () => {
    const current = document.getElementById('currentPw').value;
    const newPw   = document.getElementById('newPw').value;
    const confirm = document.getElementById('confirmPw').value;
    if (!current || !newPw || !confirm) { showToast('All password fields are required.', 'warning'); return; }
    const freshUser = Store.getUserById(user.id);
    if (freshUser.password !== current) { showToast('Current password is incorrect.', 'error'); return; }
    if (newPw !== confirm) { showToast('New passwords do not match.', 'error'); return; }
    if (newPw.length < 6) { showToast('Password must be at least 6 characters.', 'warning'); return; }
    Store.updateUser(user.id, { password: newPw });
    document.getElementById('currentPw').value = '';
    document.getElementById('newPw').value = '';
    document.getElementById('confirmPw').value = '';
    showToast('Password updated successfully! 🔒', 'success');
  });
</script>
</body>
</html>
